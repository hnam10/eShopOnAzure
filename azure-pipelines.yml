trigger:
- main

stages:
- stage: Build
  displayName: Build Stage
  jobs:
  - job: BuildJob
    pool:
      name: PRO690
      demands:
      - agent.name -equals hansol-ubuntu
    steps:
    - script: |
        echo "=== BUILD STAGE ==="
        echo "Agent Name: $(Agent.Name)"
        echo "Building application..."
        echo "Build completed"
      displayName: Build

- stage: Test
  displayName: Test Stage
  dependsOn: Build
  condition: succeeded()
  jobs:
  - job: TestJob
    pool:
      name: PRO690
      demands:
      - agent.name -equals hansol-ubuntu
    steps:
    - script: |
        echo "=== TEST STAGE ==="
        echo "Agent Name: $(Agent.Name)"
        echo "Running tests..."
        echo "Tests passed"
      displayName: Test

