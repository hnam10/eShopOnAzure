trigger:
- main

stages:
- stage: Build
  displayName: Build Stage
  jobs:
  - job: BuildJob
    pool:
      name: PRO690
      demands:
      - agent.name -equals hansol-ubuntu
    steps:
    - script: |
        echo "=== BUILD STAGE ==="
        echo "Agent Name: $(Agent.Name)"
        echo "Build completed"
      displayName: Build

- stage: Test
  displayName: Test Stage
  dependsOn: Build
  condition: succeeded()
  jobs:
  - job: TestJob
    pool:
      name: PRO690
      demands:
      - agent.name -equals hansol-ubuntu
    steps:
    - script: |
        echo "=== TEST STAGE ==="
        echo "Agent Name: $(Agent.Name)"
        echo "Tests passed"
      displayName: Test

- stage: Deploy
  displayName: Deploy Stage
  dependsOn: Test
  condition: succeeded()
  jobs:
  - deployment: DeployJob
    environment: production
    pool:
      vmImage: ubuntu-latest
    strategy:
      runOnce:
        deploy:
          steps:
          - script: |
              echo "=== DEPLOY STAGE ==="
              echo "Agent Name: $(Agent.Name)"
              echo "Deployment completed"
            displayName: Deploy